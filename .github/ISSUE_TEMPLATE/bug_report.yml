name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please include enough detail for someone else to reproduce.
        Do not paste secrets, auth headers, cookies, private repository names, private patch contents, full webhook payloads, or unredacted Wrangler logs into a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: "The bot posted an assessment on a PR but the score was wrong because..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "The PR should have been scored at most X because..."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Links to public PRs/comments or redacted webhook payload excerpts are extremely helpful.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: pr-url
    attributes:
      label: PR or comment URL (if applicable)
      placeholder: "https://github.com/owner/repo/pull/123"
  - type: dropdown
    id: surface
    attributes:
      label: Where did this happen?
      options:
        - Hosted instance (oss-protector.raedbahri90.workers.dev)
        - Self-hosted Worker
        - Local dev (pnpm dev)
        - Not sure
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Redacted Wrangler tail output, browser console logs, or screenshots of the bot's comment.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md).
          required: true
